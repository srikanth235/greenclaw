name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint & Format
        run: pnpm lint

      - name: Test
        run: pnpm test

  semantic-owner-docs:
    if: ${{ vars.ENABLE_SEMANTIC_HARNESS == 'true' }}
    runs-on: ubuntu-latest
    env:
      HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Codex CLI
        if: ${{ env.HAS_OPENAI_KEY == 'true' }}
        run: npm install -g @openai/codex

      - name: Authenticate Codex CLI
        if: ${{ env.HAS_OPENAI_KEY == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Semantic owner-doc harness
        if: ${{ env.HAS_OPENAI_KEY == 'true' }}
        run: GREENCLAW_ENABLE_LLM_HARNESS=1 pnpm test -- tests/owner-doc-semantic.test.ts
